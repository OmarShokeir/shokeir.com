<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – 15-Min German</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #f9fafb;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #374151;
      margin-bottom: 20px;
    }

    a.email {
      display: inline-block;
      background: #4f46e5;
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    a.email:hover {
      background: #4338ca;
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Contact & Support</h1>

    <p>
      Need help, have feedback, or want to report an issue?<br>
      Reach out and we’ll get back to you.
    </p>

    <a href="mailto:omar@shokeir.com" class="email">
      omar@shokeir.com
    </a>

    <div class="footer">
      © 2026 15-Min German
    </div>
  </div>
</body>
</html>
