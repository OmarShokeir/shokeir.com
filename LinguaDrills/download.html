<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LingaPlus</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#f7f8fc,#eef2ff);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
}

.card{
    max-width:420px;
    width:100%;
    background:white;
    border-radius:28px;
    padding:32px;
    box-shadow:
      0 20px 60px rgba(0,0,0,.08),
      0 8px 24px rgba(0,0,0,.05);
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    border-radius:24px;
    margin:0 auto 20px;
    overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    font-size:2rem;
    font-weight:800;
    color:#111827;
    margin-bottom:8px;
}

.subtitle{
    color:#6b7280;
    line-height:1.6;
    margin-bottom:28px;
}

.badges{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    padding:16px;
    border-radius:16px;
    font-weight:700;
    transition:.2s ease;
}

.btn:hover{
    transform:translateY(-2px);
}

.appstore{
    background:#111827;
    color:white;
}

.playstore{
    background:#22c55e;
    color:white;
}

.features{
    margin-top:28px;
    display:grid;
    gap:10px;
    color:#4b5563;
    font-size:.95rem;
}

.loading{
    margin-top:24px;
    color:#9ca3af;
    font-size:.9rem;
}
</style>

<script>
setTimeout(() => {
    const ua = navigator.userAgent;

    if (/Android/i.test(ua)) {
        window.location.href =
        "https://play.google.com/store/apps/details?id=com.omarshokeir.lingaplus";
    }

    if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.href =
        "https://apps.apple.com/us/app/15-min-german/id6761824657";
    }
}, 1500);
</script>

</head>

<body>

<div class="card">

    <!-- Replace with your app icon -->
    <div class="logo">
        <img src="app-icon.png" alt="LingaPlus">
    </div>

    <h1>LingaPlus</h1>

    <p class="subtitle">
        Learn German in just 15 minutes a day.
        Vocabulary, phrases, listening, speaking and daily practice.
    </p>

    <div class="badges">
        <a class="btn appstore"
           href="https://apps.apple.com/us/app/15-min-german/id6761824657">
           Download on App Store
        </a>

        <a class="btn playstore"
           href="https://play.google.com/store/apps/details?id=com.omarshokeir.lingaplus">
           Get it on Google Play
        </a>
    </div>

    <div class="features">
        <div>🇩🇪 Learn real German</div>
        <div>⚡ 15-minute daily lessons</div>
        <div>🎯 Beginner friendly</div>
        <div>📈 Track your progress</div>
    </div>

    <div class="loading">
        Redirecting to your app store...
    </div>

</div>

</body>
</html>
