<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width,initial-scale=1"
/>
<title>Email Confirmed</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,Arial,sans-serif;
background:#0F172A;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

.card{
width:100%;
max-width:520px;
background:#111827;
padding:48px;
border-radius:32px;
text-align:center;
box-shadow:
0 25px 80px rgba(0,0,0,.35);
}

.logo{
width:90px;
height:90px;
object-fit:contain;
margin-bottom:24px;
}

.check{
width:80px;
height:80px;
border-radius:999px;
background:#5B7FFF;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
margin:0 auto 28px;
}

h1{
font-size:34px;
font-weight:800;
margin-bottom:16px;
}

p{
color:rgba(255,255,255,.72);
line-height:28px;
font-size:16px;
margin-bottom:34px;
}

.button{
display:block;
width:100%;
padding:18px;
border-radius:18px;
background:#5B7FFF;
text-decoration:none;
color:white;
font-weight:700;
font-size:16px;
margin-bottom:16px;
}

.secondary{
background:rgba(255,255,255,.08);
}

.footer{
margin-top:20px;
font-size:13px;
color:rgba(255,255,255,.45);
}
</style>
</head>

<body>

<div class="card">


<div class="check">
✓
</div>

<h1>Email Confirmed</h1>

<p>
Your account is ready.
Open the app and continue learning.
</p>

<a
class="button"
href="aimobile://"
>
Open App
</a>

<a
class="button secondary"
href="https://apps.apple.com/app/idYOUR_APP_ID"
>
Download on App Store
</a>

<div class="footer">
You can close this page anytime.
</div>

</div>

<script>
setTimeout(()=>{
window.location=
"aimobile://";
},1000);
</script>

</body>
</html>
